name: Bundle analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build (analyze)
        run: npm run analyze
      - name: Upload bundle report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-stats
          path: dist/stats.html
